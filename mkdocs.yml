site_name: UCP Python SDK
site_description: Universal Commerce Protocol SDK Documentation
repo_url: https://github.com/Universal-Commerce-Protocol/python-sdk

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            merge_init_into_class: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tutorials:
      - Basic Usage: tutorials/1-basic-usage.md
  - API Reference: api/index.md
